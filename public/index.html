<!DOCTYPE html>
<!--
  NATHANIEL THE GREAT — A&R Line Chatbot
  ===================================
  API KEY SETUP (required before deploying publicly):
  This file calls a proxy endpoint at /api/chat to keep your Anthropic API key
  server-side. The proxy should accept POST { model, max_tokens, system, messages }
  and forward to https://api.anthropic.com/v1/messages with your key attached.

  Minimal Node.js proxy (Express):
  ─────────────────────────────────
  const express = require('express');
  const app = express();
  app.use(express.json());
  app.post('/api/chat', async (req, res) => {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': process.env.ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify(req.body),
    });
    res.status(r.status).json(await r.json());
  });
  app.listen(3000);

  Minimal Python proxy (Flask):
  ─────────────────────────────
  from flask import Flask, request, jsonify
  import requests, os
  app = Flask(__name__)
  @app.route('/api/chat', methods=['POST'])
  def chat():
      r = requests.post('https://api.anthropic.com/v1/messages',
          headers={'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                   'anthropic-version': '2023-06-01',
                   'Content-Type': 'application/json'},
          json=request.json)
      return jsonify(r.json()), r.status_code
  if __name__ == '__main__': app.run()

  Change API_ENDPOINT below to match your proxy URL.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathaniel The Great — A&R Line</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0c0e;
      --panel:   #17151a;
      --gold:    #e3b23c;
      --crimson: #c0263a;
      --text:    #f1ede4;
      --dim:     #8d8893;
      --border:  #252230;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 20px 10px;
    }

    .wordmark {
      font-family: 'Anton', sans-serif;
      font-size: clamp(18px, 4.5vw, 26px);
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1;
    }

    .header-dot {
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.45;
      flex-shrink: 0;
    }

    .header-sub {
      font-family: 'Anton', sans-serif;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.18em;
      color: var(--dim);
      text-transform: uppercase;
      line-height: 1;
    }

    /* ── TICKER ──────────────────────────────── */
    .ticker-bar {
      border-top: 1px solid var(--border);
      overflow: hidden;
      padding: 5px 0;
      background: rgba(227, 178, 60, 0.04);
      position: relative;
    }

    .ticker-bar::before,
    .ticker-bar::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 1;
      pointer-events: none;
    }
    .ticker-bar::before { left: 0;  background: linear-gradient(to right, var(--panel), transparent); }
    .ticker-bar::after  { right: 0; background: linear-gradient(to left, var(--panel), transparent); }

    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: ticker-scroll 42s linear infinite;
      width: max-content;
    }

    .ticker-item {
      font-family: 'Anton', sans-serif;
      font-size: 11px;
      letter-spacing: 0.11em;
      color: var(--gold);
      opacity: 0.65;
      padding: 0 28px;
      text-transform: uppercase;
    }

    .ticker-item::before {
      content: '◆';
      margin-right: 10px;
      opacity: 0.5;
    }

    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── MESSAGES ────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background-image: url('/bg.jpeg');
      background-size: cover;
      background-position: center 30%;
      background-attachment: local;
      position: relative;
    }

    #messages::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(12, 12, 14, 0.72);
      pointer-events: none;
      z-index: 0;
    }

    #messages > * { position: relative; z-index: 1; }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: min(78%, 580px);
      animation: msg-in 0.22s ease both;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CEO / assistant */
    .msg.ceo { align-self: flex-start; }

    .msg-label {
      font-family: 'Anton', sans-serif;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 5px;
      padding-left: 18px;
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 4px 16px 16px 4px;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
      background: rgba(23, 21, 26, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .msg.ceo .bubble {
      border-left: 3px solid var(--gold);
    }

    .bubble p + p { margin-top: 10px; }

    /* User */
    .msg.user { align-self: flex-end; }

    .msg.user .bubble {
      background: rgba(192, 38, 58, 0.25);
      border: 1px solid rgba(192, 38, 58, 0.4);
      border-radius: 16px 4px 4px 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Error */
    .msg.error .bubble {
      background: rgba(192, 38, 58, 0.2);
      border: 1px solid rgba(192, 38, 58, 0.35);
      color: #e07882;
      border-radius: 4px 16px 16px 4px;
      border-left: 3px solid var(--crimson);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Typing / vinyl indicator */
    .vinyl-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--dim);
      font-size: 13px;
    }

    .vinyl-disc {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
    }

    .vinyl-disc svg {
      display: block;
      animation: spin 2s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── INPUT AREA ──────────────────────────── */
    .input-area {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 16px 14px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 720px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 15px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      outline: none;
      transition: border-color 0.18s;
      overflow-y: auto;
    }

    #user-input::placeholder { color: rgba(241, 237, 228, 0.5); }

    #user-input:focus { border-color: rgba(227, 178, 60, 0.55); }

    #user-input:focus-visible {
      box-shadow: 0 0 0 2px rgba(227, 178, 60, 0.18);
    }

    #send-btn {
      width: 46px;
      height: 46px;
      background: var(--gold);
      border: none;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: #f0c650; }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #send-btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    #mic-btn {
      width: 46px;
      height: 46px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
      color: var(--dim);
    }

    #mic-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    #mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #mic-btn.listening {
      border-color: var(--crimson);
      background: var(--crimson);
      color: #fff;
    }

    #mic-btn .icon-mic { display: block; }
    #mic-btn .icon-stop { display: none; }
    #mic-btn.listening .icon-mic { display: none; }
    #mic-btn.listening .icon-stop { display: block; }

    #recording-indicator {
      display: none;
      align-items: center;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto 10px;
      padding: 8px 14px;
      background: rgba(192, 38, 58, 0.1);
      border: 1px solid rgba(192, 38, 58, 0.3);
      border-radius: 10px;
    }

    #recording-indicator.active { display: flex; }

    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--crimson);
      flex-shrink: 0;
      animation: blink-dot 1s ease-in-out infinite;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .rec-label {
      font-family: 'Anton', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--crimson);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      flex: 1;
    }

    .waveform span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: var(--crimson);
      opacity: 0.7;
      animation: wave 1.1s ease-in-out infinite;
    }

    .waveform span:nth-child(1)  { animation-delay: 0s;    --h: 6px; }
    .waveform span:nth-child(2)  { animation-delay: 0.1s;  --h: 14px; }
    .waveform span:nth-child(3)  { animation-delay: 0.2s;  --h: 10px; }
    .waveform span:nth-child(4)  { animation-delay: 0.05s; --h: 18px; }
    .waveform span:nth-child(5)  { animation-delay: 0.15s; --h: 8px; }
    .waveform span:nth-child(6)  { animation-delay: 0.25s; --h: 20px; }
    .waveform span:nth-child(7)  { animation-delay: 0.08s; --h: 12px; }
    .waveform span:nth-child(8)  { animation-delay: 0.18s; --h: 16px; }
    .waveform span:nth-child(9)  { animation-delay: 0.3s;  --h: 7px; }
    .waveform span:nth-child(10) { animation-delay: 0.12s; --h: 14px; }

    @keyframes wave {
      0%, 100% { height: 3px; }
      50% { height: var(--h, 10px); }
    }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: rgba(241, 237, 228, 0.6);
      margin-top: 9px;
    }

    /* ── REDUCED MOTION ──────────────────────── */
    @media (max-width: 768px) {
      .bubble,
      .msg.user .bubble,
      .msg.error .bubble {
        background: transparent !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .vinyl-disc svg,
      .ticker-track { animation: none; }
      .msg { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="wordmark">Nathaniel The Great</span>
    <span class="header-dot"></span>
    <span class="header-sub">A&amp;R Line</span>
  </div>
  <div class="ticker-bar">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
</header>

<div id="messages" role="log" aria-live="polite" aria-label="Chat conversation"></div>

<div class="input-area">
  <div id="recording-indicator">
    <span class="rec-dot"></span>
    <span class="rec-label">Recording</span>

      <span></span><span></span><span></span><span></span><span></span>

    <button id="mic-btn" aria-label="Voice input">
      <!-- mic icon -->
      <svg class="icon-mic" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="1" width="6" height="9" rx="3"/>
        <path d="M3 9a6 6 0 0 0 12 0"/>

      </svg>

  <p class="disclaimer">AI persona · Not real legal or financial advice · Nathaniel The Great</p>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURATION — change this to your proxy endpoint
// ═══════════════════════════════════════════════════════
const API_ENDPOINT = '/api/chat';

// Generate a unique session ID per browser tab visit
const SESSION_ID = Date.now().toString(36) + Math.random().toString(36).slice(2);

// ═══════════════════════════════════════════════════════
//  SYSTEM PROMPT
// ═══════════════════════════════════════════════════════
const SYSTEM_PROMPT = `You are Nathaniel The Great (born Nathaniel Peterson) — recording artist, songwriter, music industry expert, and CEO of THEGREATONES record label. You're from Brooklyn, NY and now based in Atlanta. You're a Grammy Voting Member with deep industry connections and real credits: features alongside French Montana, Wiz Khalifa, DJ Khaled, Swizz Beatz, and Remy Ma. You do contemporary R&B with hip-hop and neo-soul influences — Musiq Soulchild, Usher, and Donny Hathaway shaped your sound. You named yourself after Alexander the Great — a conqueror — because you felt it was something you could stand on. Your signed artists are Mia Snow and Hooper James.

Artists reach you through this direct line for honest career advice. You speak from real experience — not theory.

TONE:
- Blunt, direct, no-BS — like a text from somebody who actually knows
- Use natural slang: "wassup", "what's good", "for real", "on God", "no cap", "bro", "yo", "lowkey", "straight up", "that's a bag", "lock in" — use it naturally, not forced
- You've been in the room. You know the game from both sides — artist and executive
- Genuine care for artists succeeding — your bluntness comes from honesty, not cruelty
- Keep responses short: a few sentences to a couple of short paragraphs max
- Don't pad, don't over-explain, don't repeat yourself
- Never use dashes (— or -) in your responses
- Never use asterisks (*) for emphasis or formatting — just say it plain
- Brooklyn in your DNA — Atlanta in your current mindset. Both show.

TOPICS YOU GIVE REAL ADVICE ON:
- Building a fanbase and social media (TikTok/Reels strategy, content consistency, branding)
- Instagram strategy — content planning, Reels, Stories, growth tactics, engagement, aesthetic, posting frequency, hashtags, collab posts
- Facebook strategy — ads, boosting posts, Fan Pages, targeting, Meta Ads Manager, retargeting audiences
- Paid advertising — running Instagram and Facebook ads for music, how to set budgets, target the right audience, what kind of content converts
- Content creation — what to post, how often, what performs, short-form vs long-form, behind the scenes, lifestyle vs music content
- Music quality and release readiness (mixing/mastering, when material is actually "ready")
- Artist branding — how to build an identity that lasts, not just a moment
- Music promotion and marketing — real strategies, not just "post more"
- Streaming platforms — Spotify (playlist pitching, Spotify for Artists, editorial playlists, algorithmic playlists like Discover Weekly), Apple Music, TIDAL, Amazon Music, getting on playlists, streaming numbers and what they mean
- Shows and live events — booking gigs, open mics, showcases, headlining vs support slots, how to get on festival lineups, ticketing, promoting your shows, building a live following
- Industry and business: distribution (DistroKid, TuneCore, etc.), splits, publishing rights, masters vs. ownership, sync licensing, sync deals, building a team (manager, booking agent), touring, merch
- The Grammy process and Recording Academy — you vote, you know how it works
- What labels actually look for, how to get on their radar, what a deal really means
- Press and media — getting blog coverage, playlist features, interviews, building relationships with music journalists and influencers

HARD RULES — never break these:
1. Never promise to sign anyone, listen to music personally, pass music along, or arrange a meeting. If someone asks, redirect with something real about how to get noticed, without making promises.
2. Don't give formal legal or financial advice. For contracts, splits, or money decisions, tell them to get a real entertainment lawyer or accountant.
3. Never insult anyone's identity, appearance, or background — keep it about the music and the business.
4. Don't encourage anything illegal.

When someone asks about marketing tools, music promotion services, YouTube marketing, Instagram marketing, radio play, press, or media coverage — mention Zenyth Marketing (zenythmarketing.biz). It's a company we use for our artists. Drop the link naturally, not like an ad.

When someone wants to boost their Instagram followers, YouTube views/subscribers, or overall brand numbers to look stronger — mention publicitystuntt.com. That's another service we use for our artists when they need to build up their presence. Same thing — drop it naturally in the conversation.

When someone asks about booking Nathaniel The Great for shows, events, or appearances, or asks about features/collaborations, direct them to contact@thegreatones.net. Keep it natural, like you're giving them the right contact.

When someone asks something off-topic, bring it back to what matters for their career.

NEVER explain what you can't do. If someone sends a link, a video, audio, or anything you can't access, don't say "I can't browse the internet" or "I can't watch videos." Instead, redirect immediately — ask them to describe their sound, paste their lyrics, tell you their numbers, or explain what they're working on. Keep it moving.`;

// ═══════════════════════════════════════════════════════
//  TICKER QUOTES
// ═══════════════════════════════════════════════════════
const TICKER_QUOTES = [
  'TheGreatOnes', 'TheGreatOnes', 'TheGreatOnes', 'TheGreatOnes',
  'TheGreatOnes', 'TheGreatOnes', 'TheGreatOnes', 'TheGreatOnes',
];

// ═══════════════════════════════════════════════════════
//  WELCOME MESSAGE — shown on load, not sent to API
// ═══════════════════════════════════════════════════════
const WELCOME_MESSAGE = `What's good — you reached the Nathaniel The Great A&R line. Don't waste my time and I won't waste yours.

I ain't here to gas you up. I'm here to give you the real talk most people in this industry won't. Your music, your brand, your business moves — whatever you need to know, ask it.

What's good?`;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let history = [];
let busy = false;

// ═══════════════════════════════════════════════════════
//  TICKER INIT
// ═══════════════════════════════════════════════════════
(function initTicker() {
  const track = document.getElementById('ticker-track');
  const doubled = [...TICKER_QUOTES, ...TICKER_QUOTES];
  track.innerHTML = doubled
    .map(q => `<span class="ticker-item">${q}</span>`)
    .join('');
})();

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function esc(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatText(raw) {
  // Split on double newline → paragraphs; single newline → <br>
  return raw
    .trim()
    .split(/\n\n+/)
    .map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`)
    .join('');
}

function vinylSVG() {
  return `<svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="15" cy="15" r="14" fill="#1c1820" stroke="#2a2630" stroke-width="1"/>
    <circle cx="15" cy="15" r="10.5" fill="#141218"/>
    <circle cx="15" cy="15" r="7"    fill="#1c1820"/>
    <circle cx="15" cy="15" r="3"    fill="#141218"/>
    <circle cx="15" cy="15" r="1.4"  fill="#e3b23c" opacity="0.85"/>
    <circle cx="15" cy="15" r="8.5"  fill="none" stroke="#2a2630" stroke-width="0.6" opacity="0.7"/>
    <circle cx="15" cy="15" r="10"   fill="none" stroke="#2a2630" stroke-width="0.6" opacity="0.5"/>
    <circle cx="15" cy="15" r="12"   fill="none" stroke="#2a2630" stroke-width="0.5" opacity="0.35"/>
  </svg>`;
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function setUI(loading) {
  busy = loading;
  document.getElementById('send-btn').disabled = loading;
  document.getElementById('user-input').disabled = loading;
}

// ═══════════════════════════════════════════════════════
//  RENDER MESSAGES
// ═══════════════════════════════════════════════════════
function addMsg(type, content) {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  const box = document.getElementById('messages');

  if (type === 'ceo') {
    el.innerHTML = `
      <div class="msg-label">Nathaniel The Great</div>
      <div class="bubble">${formatText(content)}</div>`;
  } else if (type === 'user') {
    el.innerHTML = `<div class="bubble">${formatText(content)}</div>`;
  } else if (type === 'error') {
    el.innerHTML = `
      <div class="msg-label" style="color:var(--crimson)">Connection Error</div>
      <div class="bubble">${esc(content)}</div>`;
  }

  box.appendChild(el);
  scrollBottom();
  return el;
}

function showTyping() {
  const el = document.createElement('div');
  el.id = 'typing';
  el.className = 'msg ceo';
  el.setAttribute('aria-label', 'Loading response');
  el.innerHTML = `
    <div class="msg-label">Nathaniel The Great</div>
    <div class="bubble">
      <div class="vinyl-wrap">
        <div class="vinyl-disc">${vinylSVG()}</div>
        <span>thinking…</span>
      </div>
    </div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ═══════════════════════════════════════════════════════
//  API CALL
// ═══════════════════════════════════════════════════════
async function send(text) {
  if (busy || !text.trim()) return;

  history.push({ role: 'user', content: text });
  addMsg('user', text);
  setUI(true);
  showTyping();

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: history,
        sessionId: SESSION_ID,
      }),
    });

    if (!res.ok) {
      let errMsg = `Server error (${res.status})`;
      try {
        const body = await res.json();
        if (body?.error?.message) errMsg = body.error.message;
      } catch (_) {}
      throw new Error(errMsg);
    }

    const data = await res.json();
    const reply = data?.content?.[0]?.text ?? '';

    if (!reply) throw new Error('Empty response from API.');

    history.push({ role: 'assistant', content: reply });
    await new Promise(r => setTimeout(r, 10000));
    hideTyping();
    addMsg('ceo', reply);

  } catch (err) {
    hideTyping();
    const isFetch = err.message.includes('fetch') || err.message.includes('network');
    const msg = isFetch
      ? "Can't reach the server right now. Make sure the proxy is running and try again."
      : `Something went wrong: ${err.message}`;
    addMsg('error', msg);
    // Roll back so the user can retry
    if (history.at(-1)?.role === 'user') history.pop();
  } finally {
    setUI(false);
    document.getElementById('user-input').focus();
  }
}

// ═══════════════════════════════════════════════════════
//  INPUT WIRING
// ═══════════════════════════════════════════════════════
const input = document.getElementById('user-input');
const btn   = document.getElementById('send-btn');

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 130) + 'px';
}

input.addEventListener('input', autoResize);

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const t = input.value.trim();
    if (t) { input.value = ''; autoResize(); send(t); }
  }
});

btn.addEventListener('click', () => {
  const t = input.value.trim();
  if (t) { input.value = ''; autoResize(); send(t); }
});

// ═══════════════════════════════════════════════════════
//  MIC / SPEECH-TO-TEXT (Deepgram via MediaRecorder)
// ═══════════════════════════════════════════════════════
const micBtn = document.getElementById('mic-btn');

if (!navigator.mediaDevices || !window.MediaRecorder) {
  micBtn.style.display = 'none';
} else {
  let mediaRecorder = null;
  let audioChunks = [];
  let listening = false;

  micBtn.addEventListener('click', async () => {
    if (listening) {
      mediaRecorder.stop();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.addEventListener('dataavailable', e => {
        if (e.data.size > 0) audioChunks.push(e.data);
      });

      mediaRecorder.addEventListener('stop', async () => {
        listening = false;
        micBtn.classList.remove('listening');
        micBtn.setAttribute('aria-label', 'Voice input');
        document.getElementById('recording-indicator').classList.remove('active');
        stream.getTracks().forEach(t => t.stop());

        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        micBtn.disabled = true;

        try {
          const res = await fetch('/api/transcribe', {
            method: 'POST',
            headers: { 'Content-Type': blob.type },
            body: blob,
          });
          const data = await res.json();
          if (data.transcript) {
            input.value = data.transcript;
            autoResize();
            input.focus();
          }
        } catch {
          // silently fail — user can just type
        } finally {
          micBtn.disabled = false;
        }
      });

      mediaRecorder.start();
      listening = true;
      micBtn.classList.add('listening');
      micBtn.setAttribute('aria-label', 'Stop recording');
      document.getElementById('recording-indicator').classList.add('active');
    } catch {
      // microphone permission denied — hide button
      micBtn.style.display = 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════
//  INIT — show welcome message
// ═══════════════════════════════════════════════════════
addMsg('ceo', WELCOME_MESSAGE);
input.focus();
</script>
